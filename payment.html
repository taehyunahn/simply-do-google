<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>결제하기 | SimplyDo</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Toss Payments SDK -->
    <script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100">
        <div class="max-w-2xl mx-auto px-4 py-4">
            <a href="index.html" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">SimplyDo</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto px-4 py-8">

        <!-- Loading State -->
        <div id="loading-state" class="text-center py-20">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-gray-500">상품 정보를 불러오는 중...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden text-center py-20">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">상품을 찾을 수 없습니다</h2>
            <p class="text-gray-500 mb-6">올바른 링크인지 확인해주세요.</p>
            <a href="index.html" class="text-blue-600 font-medium hover:underline">홈으로 돌아가기</a>
        </div>

        <!-- Payment Form -->
        <div id="payment-form" class="hidden">
            <!-- Order Summary -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">주문 상품</h2>
                <div class="flex justify-between items-start">
                    <div>
                        <span id="product-badge" class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded mb-2 inline-block"></span>
                        <h3 id="product-name" class="text-xl font-bold text-gray-900"></h3>
                        <p id="product-tagline" class="text-gray-500 text-sm mt-1"></p>
                    </div>
                    <div class="text-right">
                        <p id="product-price" class="text-2xl font-bold text-blue-600"></p>
                    </div>
                </div>

                <!-- Option Selection -->
                <div id="option-section" class="mt-6 pt-6 border-t border-gray-100 hidden">
                    <h4 class="font-medium text-gray-900 mb-3">옵션 선택</h4>
                    <div id="option-list" class="space-y-2">
                        <!-- Options will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Customer Info -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">구매자 정보</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">이름 <span class="text-red-500">*</span></label>
                        <input type="text" id="customer-name" placeholder="홍길동"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">이메일 <span class="text-red-500">*</span></label>
                        <input type="email" id="customer-email" placeholder="example@email.com"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        <p class="text-xs text-gray-400 mt-1">결제 완료 후 파일 다운로드 링크가 발송됩니다.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">연락처 <span class="text-red-500">*</span></label>
                        <input type="tel" id="customer-phone" placeholder="010-1234-5678"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    </div>
                </div>
            </div>

            <!-- Payment Summary -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">결제 금액</h2>
                <div class="space-y-3">
                    <div class="flex justify-between text-gray-600">
                        <span>상품 금액</span>
                        <span id="summary-product-price"></span>
                    </div>
                    <div id="summary-option-row" class="flex justify-between text-gray-600 hidden">
                        <span id="summary-option-name">옵션</span>
                        <span id="summary-option-price"></span>
                    </div>
                    <div class="border-t border-gray-100 pt-3 flex justify-between">
                        <span class="font-bold text-gray-900">총 결제 금액</span>
                        <span id="summary-total" class="text-xl font-bold text-blue-600"></span>
                    </div>
                </div>
            </div>

            <!-- Terms Agreement -->
            <div class="mb-6">
                <label class="flex items-start space-x-3 cursor-pointer">
                    <input type="checkbox" id="agree-terms" class="mt-1 w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-600">
                        <span class="font-medium text-gray-900">구매 조건 및 환불 규정</span>에 동의합니다.
                        디지털 상품의 특성상 다운로드 후에는 환불이 불가합니다.
                    </span>
                </label>
            </div>

            <!-- Payment Button -->
            <button id="payment-button" onclick="requestPayment()" disabled
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed shadow-lg shadow-blue-200">
                <span id="payment-button-text">결제하기</span>
            </button>

            <!-- Payment Methods Info -->
            <p class="text-center text-xs text-gray-400 mt-4">
                신용카드, 체크카드, 간편결제(카카오페이, 네이버페이 등)를 지원합니다.
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 mt-auto">
        <div class="max-w-2xl mx-auto px-4 py-6">
            <div class="text-xs text-gray-500 space-y-1">
                <p>상호: 심플리Do | 대표: [대표자명]</p>
                <p>사업자등록번호: [207-28-02850]</p>
                <p>문의: simply.do.dev@gamil.com</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/payment.js"></script>
    <script>
        // Initialize payment page
        document.addEventListener('DOMContentLoaded', () => {
            initPaymentPage();
        });
    </script>
</body>
</html>
